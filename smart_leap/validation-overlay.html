<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMART LEAP Validation Overlay Fillable</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --page-width: 900px;
      --sheet-ratio: 0.69921875;
      --ink: #111;
      --accent: #114fa8;
    }

    body {
      margin: 0;
      padding: 20px;
      background: radial-gradient(circle at top, #edf4ff, #dfe8f4 58%, #d4dfed 100%);
      color: var(--ink);
      font-family: "Times New Roman", Georgia, serif;
    }

    .shell {
      width: min(100%, 980px);
      margin: 0 auto;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      font: 14px/1.3 Arial, sans-serif;
      color: #213554;
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .toolbar button {
      border: 1px solid #b8c8df;
      background: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      font: inherit;
      cursor: pointer;
    }

    .toolbar button.active {
      background: #114fa8;
      color: #fff;
      border-color: #114fa8;
    }

    .sheet {
      position: relative;
      width: min(100%, var(--page-width));
      aspect-ratio: 1432 / 2048;
      margin: 0 auto;
      background: #fff url("validation-scan.jpg") center top / contain no-repeat;
      box-shadow: 0 16px 40px rgba(18, 42, 88, 0.14);
      border: 1px solid #d8e0eb;
      overflow: hidden;
    }

    .field {
      position: absolute;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      color: #111;
      font: 700 1.24%/1 "Times New Roman", Georgia, serif;
      outline: none;
      resize: none;
    }

    .field::placeholder {
      color: transparent;
    }

    .field.guide-on {
      box-shadow: inset 0 0 0 1px rgba(17, 79, 168, 0.35);
      background: rgba(255, 255, 255, 0.06);
    }

    .name-split {
      text-align: center;
      font-weight: 600;
    }

    .recommendation-line {
      font-weight: 400;
    }

    .statement {
      font-weight: 600;
      line-height: 1.12;
    }

    .radio-cell {
      position: absolute;
      margin: 0;
      width: 1.6%;
      aspect-ratio: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .upload-button {
      position: absolute;
      border: 1px solid #b7c9e4;
      background: rgba(255, 255, 255, 0.92);
      color: #153762;
      border-radius: 999px;
      padding: 0.35em 0.7em;
      font: 600 1.05%/1.1 Arial, sans-serif;
      cursor: pointer;
    }

    .upload-button input {
      display: none;
    }

    .upload-chip {
      position: absolute;
      font: 600 0.95%/1 Arial, sans-serif;
      color: #2f4f79;
      max-width: 16%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 900px) {
      body {
        padding: 10px;
      }

      .toolbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .toolbar button {
        padding: 7px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="toolbar">
      <div>Frontend-only scan-overlay test. The real scan is the page base and the fields sit on top of it.</div>
      <div class="toolbar-actions">
        <button id="toggleGuides" type="button">Toggle field guides</button>
      </div>
    </div>

    <div class="sheet" id="sheet">
      <input class="field" style="left:24.2%; top:17.8%; width:13.4%; height:1.35%;" type="date" aria-label="Date of Validation">

      <input class="field" style="left:17.8%; top:20.85%; width:59.3%; height:1.35%;" type="text" aria-label="Name line">

      <input class="field name-split" style="left:19.2%; top:23.2%; width:17.7%; height:1.2%;" type="text" aria-label="Last Name">
      <input class="field name-split" style="left:42.8%; top:23.2%; width:17.7%; height:1.2%;" type="text" aria-label="First Name">
      <input class="field name-split" style="left:66.2%; top:23.2%; width:17.7%; height:1.2%;" type="text" aria-label="Middle Name">

      <input class="field" style="left:21.9%; top:26.6%; width:15.5%; height:1.3%;" type="text" aria-label="Purok">
      <input class="field" style="left:47.2%; top:26.6%; width:27.1%; height:1.3%;" type="text" aria-label="Barangay">

      <input class="field" style="left:20.8%; top:29.68%; width:16.5%; height:1.3%;" type="date" aria-label="Birthday">
      <input class="field" style="left:59.4%; top:29.68%; width:15.8%; height:1.3%;" type="text" aria-label="Educational Attainment">

      <input class="field" style="left:24.6%; top:32.72%; width:18.7%; height:1.3%;" type="text" aria-label="Contact number">

      <input class="radio-cell" style="left:45.1%; top:39.76%;" type="radio" name="pantawid" aria-label="Pantawid Member Yes">
      <input class="radio-cell" style="left:50.8%; top:39.76%;" type="radio" name="pantawid" aria-label="Pantawid Member No">
      <input class="field" style="left:57.4%; top:39.32%; width:18.3%; height:1.18%;" type="text" aria-label="Pantawid Specify">

      <input class="radio-cell" style="left:45.1%; top:42.45%;" type="radio" name="slpa" aria-label="SLPA Member Yes">
      <input class="radio-cell" style="left:50.8%; top:42.45%;" type="radio" name="slpa" aria-label="SLPA Member No">
      <input class="field" style="left:57.4%; top:42.05%; width:18.3%; height:1.18%;" type="text" aria-label="SLPA Specify">

      <input class="field recommendation-line" style="left:35.6%; top:48.58%; width:40.2%; height:1.05%;" type="text" aria-label="Validator Recommendation line 1">
      <input class="field recommendation-line" style="left:35.6%; top:50.75%; width:40.2%; height:1.05%;" type="text" aria-label="Validator Recommendation line 2">

      <input class="field statement" style="left:20.3%; top:59.56%; width:28.5%; height:1.15%;" type="text" aria-label="Resident name statement">
      <input class="field statement" style="left:53.6%; top:59.56%; width:6.8%; height:1.15%;" type="text" aria-label="Age statement">
      <input class="field statement" style="left:16.8%; top:62.38%; width:22.6%; height:1.15%;" type="text" aria-label="Barangay statement">
      <input class="field statement" style="left:52.2%; top:66.18%; width:23.2%; height:1.15%;" type="text" aria-label="Eligibility result statement">

      <label class="upload-button" style="left:12.2%; top:76.85%;">
        Upload participant
        <input type="file" accept=".jpg,.jpeg,.png,.webp,.pdf">
      </label>
      <div class="upload-chip" style="left:12.3%; top:79.1%;" id="participantFileName"></div>

      <label class="upload-button" style="left:51.2%; top:76.85%;">
        Upload validator
        <input type="file" accept=".jpg,.jpeg,.png,.webp,.pdf">
      </label>
      <div class="upload-chip" style="left:51.3%; top:79.1%;" id="validatorFileName"></div>
    </div>
  </div>

  <script>
    const sheet = document.getElementById('sheet');
    const toggleGuidesButton = document.getElementById('toggleGuides');
    const fields = Array.from(sheet.querySelectorAll('.field'));

    toggleGuidesButton.addEventListener('click', () => {
      const active = toggleGuidesButton.classList.toggle('active');
      fields.forEach((field) => field.classList.toggle('guide-on', active));
    });

    const uploadButtons = sheet.querySelectorAll('.upload-button');
    uploadButtons.forEach((button) => {
      const input = button.querySelector('input[type="file"]');
      const target = document.getElementById(
        button.textContent.includes('participant') ? 'participantFileName' : 'validatorFileName'
      );

      input.addEventListener('change', () => {
        target.textContent = input.files && input.files[0] ? input.files[0].name : '';
      });
    });
  </script>
</body>
</html>
